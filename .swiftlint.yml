disabled_rules:
  - opening_brace
  - file_length

included:

excluded:
  - .build
  - "*.build"

cyclomatic_complexity:
  ignores_case_statements: true

function_body_length: 100

identifier_name:
  min_length: 2
  max_length:
    warning: 40
    error: 60
  excluded:
    - id
    - ok
    - ix
    - pb
    - tz
